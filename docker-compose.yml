services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      GLUE_DATABASE: ${GLUE_DATABASE:-trailwhisperer_db}
      GLUE_TABLE: ${GLUE_TABLE:-cloudtrail_logs}
      GLUE_VPC_TABLE: ${GLUE_VPC_TABLE:-vpc_flow_logs}
      ATHENA_WORKGROUP: ${ATHENA_WORKGROUP:-primary}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-6}
      BYTES_SCANNED_CUTOFF: ${BYTES_SCANNED_CUTOFF:-1073741824}
      ALLOWED_TIME_RANGE_MAX_DAYS: ${ALLOWED_TIME_RANGE_MAX_DAYS:-90}
      AUTH_TOKEN: ${AUTH_TOKEN:-local-dev-token}
    env_file:
      - .env
    # No `command:` here — the image's production CMD is used by default.
    # Local dev auto-reload is layered on by docker-compose.override.yml, which
    # `docker compose up` merges automatically. Non-dev targets (e.g. the EC2
    # deploy) run `docker compose -f docker-compose.yml up` to skip the override.

  frontend:
    image: python:3.13-slim
    working_dir: /srv
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/srv
    command: python -m http.server 8080
