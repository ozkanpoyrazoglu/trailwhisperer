AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TrailWhisperer - Serverless, ephemeral natural-language CloudTrail investigator.
  API Gateway (HTTP API) + Lambda orchestrator + Athena Workgroup + Glue table
  (partition projection) + Secrets Manager auth token + static SPA on S3/CloudFront.

Parameters:
  CloudTrailLogBucketName:
    Type: String
    Description: Existing S3 bucket that receives CloudTrail management events.
  VpcFlowLogsBucketName:
    Type: String
    Description: Existing S3 bucket that receives VPC Flow Logs (default fields, delivered to S3).
  GlueDatabaseName:
    Type: String
    Default: trailwhisperer_db
  GlueTableName:
    Type: String
    Default: cloudtrail_logs
  VpcFlowLogsTableName:
    Type: String
    Default: vpc_flow_logs
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-sonnet-20241022-v2:0
    Description: Bedrock model id used for NL->SQL and summarization.
  BytesScannedCutoff:
    Type: Number
    Default: 1073741824
    Description: Per-query bytes-scanned cap (runaway-cost guard). Default 1 GB.
  AllowedTimeRangeMaxDays:
    Type: Number
    Default: 90
    Description: Max eventTime window (days) the orchestrator will allow per query.
  ArtifactBucketPrefix:
    Type: String
    Default: trailwhisperer-artifacts
    Description: >
      Prefix of the public release bucket holding the packaged backend + frontend.
      The actual bucket is "<prefix>-<region>" (must exist in THIS region — Lambda
      code buckets are region-local). Published via scripts/publish.sh.
  ArtifactVersion:
    Type: String
    Default: v1
    Description: Release version = S3 key prefix under the artifact bucket (e.g. v1).
  EnableProwlerScan:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      When "true", provision an optional Prowler security scan (CodeBuild + findings
      bucket + Glue table) and let the orchestrator correlate Prowler findings with
      CloudTrail / VPC Flow Logs. Trigger the CodeBuild project manually (or on a
      schedule you add) to populate the findings bucket.
  ProwlerFindingsTableName:
    Type: String
    Default: prowler_findings
    Description: Glue table name mapping the Prowler JSON findings (used only when EnableProwlerScan=true).

Conditions:
  HasProwler: !Equals [!Ref EnableProwlerScan, "true"]

Resources:

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireResults
            Status: Enabled
            ExpirationInDays: 7

  SpaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SpaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-spa-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SpaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: SpaOrigin
            DomainName: !GetAtt SpaBucket.RegionalDomainName
            OriginAccessControlId: !Ref SpaOriginAccessControl
            S3OriginConfig: { OriginAccessIdentity: "" }
        DefaultCacheBehavior:
          TargetOriginId: SpaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  SpaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SpaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${SpaBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SpaDistribution}"

  AuthTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/auth-token"
      Description: Bearer token the SPA sends to the orchestrator API.
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: token
        PasswordLength: 40
        ExcludePunctuation: true

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName

  GlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: !Ref GlueTableName
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: cloudtrail
          "projection.enabled": "true"
          "projection.account.type": "enum"
          "projection.account.values": !Sub "${AWS::AccountId}"
          "projection.region.type": "enum"
          "projection.region.values": "us-east-1,us-east-2,us-west-1,us-west-2,eu-west-1,eu-west-2,eu-central-1,eu-north-1,ap-south-1,ap-southeast-1,ap-southeast-2,ap-northeast-1,ap-northeast-2,ca-central-1,sa-east-1"
          "projection.dt.type": "date"
          "projection.dt.format": "yyyy/MM/dd"
          "projection.dt.range": "NOW-3YEARS,NOW"
          "projection.dt.interval": "1"
          "projection.dt.interval.unit": "DAYS"
          "storage.location.template": !Sub "s3://${CloudTrailLogBucketName}/AWSLogs/${!account}/CloudTrail/${!region}/${!dt}"
        PartitionKeys:
          - { Name: account, Type: string }
          - { Name: region, Type: string }
          - { Name: dt, Type: string }
        StorageDescriptor:
          Location: !Sub "s3://${CloudTrailLogBucketName}/AWSLogs/"
          InputFormat: com.amazon.emr.cloudtrail.CloudTrailInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: com.amazon.emr.hive.serde.CloudTrailSerde
          Columns:
            - { Name: eventversion, Type: string }
            - { Name: useridentity, Type: "struct<type:string,principalid:string,arn:string,accountid:string,invokedby:string,accesskeyid:string,username:string,sessioncontext:struct<attributes:struct<mfaauthenticated:string,creationdate:string>,sessionissuer:struct<type:string,principalid:string,arn:string,accountid:string,username:string>>>" }
            - { Name: eventtime, Type: string }
            - { Name: eventsource, Type: string }
            - { Name: eventname, Type: string }
            - { Name: awsregion, Type: string }
            - { Name: sourceipaddress, Type: string }
            - { Name: useragent, Type: string }
            - { Name: errorcode, Type: string }
            - { Name: errormessage, Type: string }
            - { Name: requestparameters, Type: string }
            - { Name: responseelements, Type: string }
            - { Name: additionaleventdata, Type: string }
            - { Name: requestid, Type: string }
            - { Name: eventid, Type: string }
            - { Name: resources, Type: "array<struct<arn:string,accountid:string,type:string>>" }
            - { Name: eventtype, Type: string }
            - { Name: apiversion, Type: string }
            - { Name: readonly, Type: string }
            - { Name: recipientaccountid, Type: string }
            - { Name: serviceeventdetails, Type: string }
            - { Name: sharedeventid, Type: string }
            - { Name: vpcendpointid, Type: string }

  VpcFlowLogsTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: !Ref VpcFlowLogsTableName
        TableType: EXTERNAL_TABLE
        Parameters:
          # VPC Flow Logs are delivered to S3 as space-delimited text with a header line.
          "skip.header.line.count": "1"
          "projection.enabled": "true"
          "projection.account.type": "enum"
          "projection.account.values": !Sub "${AWS::AccountId}"
          "projection.region.type": "enum"
          "projection.region.values": "us-east-1,us-east-2,us-west-1,us-west-2,eu-west-1,eu-west-2,eu-central-1,eu-north-1,ap-south-1,ap-southeast-1,ap-southeast-2,ap-northeast-1,ap-northeast-2,ca-central-1,sa-east-1"
          "projection.dt.type": "date"
          "projection.dt.format": "yyyy/MM/dd"
          "projection.dt.range": "NOW-3YEARS,NOW"
          "projection.dt.interval": "1"
          "projection.dt.interval.unit": "DAYS"
          "storage.location.template": !Sub "s3://${VpcFlowLogsBucketName}/AWSLogs/${!account}/vpcflowlogs/${!region}/${!dt}"
        PartitionKeys:
          - { Name: account, Type: string }
          - { Name: region, Type: string }
          - { Name: dt, Type: string }
        StorageDescriptor:
          Location: !Sub "s3://${VpcFlowLogsBucketName}/AWSLogs/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.serde2.lazy.LazySimpleSerDe
            Parameters:
              "field.delim": " "
              "serialization.format": " "
          Columns:
            - { Name: version, Type: int }
            - { Name: account_id, Type: string }
            - { Name: interface_id, Type: string }
            - { Name: srcaddr, Type: string }
            - { Name: dstaddr, Type: string }
            - { Name: srcport, Type: int }
            - { Name: dstport, Type: int }
            - { Name: protocol, Type: bigint }
            - { Name: packets, Type: bigint }
            - { Name: bytes, Type: bigint }
            - { Name: start, Type: bigint }
            - { Name: end, Type: bigint }
            - { Name: action, Type: string }
            - { Name: log_status, Type: string }

  # ---------------------------------------------------------------------------
  # Optional Prowler security scan (EnableProwlerScan=true). A CodeBuild project
  # runs Prowler against the account and writes JSON findings to S3; a Glue table
  # exposes them to Athena so the orchestrator can correlate the static security
  # posture with the dynamic CloudTrail / VPC Flow logs.
  # ---------------------------------------------------------------------------
  ProwlerFindingsBucket:
    Type: AWS::S3::Bucket
    Condition: HasProwler
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ProwlerBuildRole:
    Type: AWS::IAM::Role
    Condition: HasProwler
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      # Prowler needs broad read/describe across the account to audit it.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess
      Policies:
        - PolicyName: prowler-build
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteFindings
                Effect: Allow
                Action: [s3:PutObject, s3:GetObject, s3:ListBucket, s3:DeleteObject]
                Resource:
                  - !GetAtt ProwlerFindingsBucket.Arn
                  - !Sub "${ProwlerFindingsBucket.Arn}/*"
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"

  ProwlerScanProject:
    Type: AWS::CodeBuild::Project
    Condition: HasProwler
    Properties:
      Name: !Sub "${AWS::StackName}-prowler-scan"
      Description: Runs Prowler and writes Athena-ready JSONL findings to the findings bucket.
      ServiceRole: !GetAtt ProwlerBuildRole.Arn
      TimeoutInMinutes: 120
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: PROWLER_BUCKET
            Value: !Ref ProwlerFindingsBucket
      Source:
        Type: NO_SOURCE
        # Run Prowler, then flatten its nested ASFF JSON *array* into newline-delimited
        # JSON (one object per line) with EXACTLY the flat columns the Glue table
        # exposes, so Athena's JSON SerDe (which expects JSONL) can read it directly.
        # Written to a dedicated `athena/` prefix that ProwlerFindingsTable points at.
        BuildSpec: |
          version: 0.2
          phases:
            build:
              commands:
                - pip install prowler
                # Prowler exits non-zero when it finds failing checks — that is a normal
                # result here, not a build failure, so don't let it abort the build.
                - prowler aws -M json-asff -o ./prowler-out || true
                - |
                  set -e
                  ASFF=$(ls ./prowler-out/*.asff.json 2>/dev/null | head -1)
                  if [ -z "$ASFF" ]; then echo "ERROR: no ASFF output produced"; exit 1; fi
                  jq -c '.[] | {finding_uid: .Id, check_id: (.GeneratorId|sub("^prowler-";"")), check_title: .Title, status: (if ((.Compliance.Status // "")|ascii_upcase|startswith("PASS")) then "PASS" elif ((.Compliance.Status // "")|ascii_upcase|startswith("FAIL")) then "FAIL" else (.Compliance.Status // "") end), status_extended: .Description, severity: ((.Severity.Label // "")|ascii_downcase), service_name: (.GeneratorId|sub("^prowler-";"")|split("_")[0]), region: (.Resources[0].Region // .ProductFields.Region // ""), resource_id: (.Resources[0].Id // ""), resource_arn: (.Resources[0].Id // ""), account_id: .AwsAccountId}' "$ASFF" > findings.jsonl
                  echo "Findings rows: $(wc -l < findings.jsonl)"
                  # Replace the previous scan so the table always reflects the latest run.
                  aws s3 rm "s3://$PROWLER_BUCKET/athena/" --recursive || true
                  aws s3 cp findings.jsonl "s3://$PROWLER_BUCKET/athena/findings.jsonl"

  ProwlerFindingsTable:
    Type: AWS::Glue::Table
    Condition: HasProwler
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: !Ref ProwlerFindingsTableName
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
        # Reads the JSONL the CodeBuild buildspec writes to the `athena/` prefix —
        # one flat JSON object per line, keyed exactly to the columns below. (The raw
        # nested ASFF array Prowler emits is NOT queryable by the JSON SerDe directly;
        # the buildspec's jq step is what makes this table work.)
        StorageDescriptor:
          Location: !Sub "s3://${ProwlerFindingsBucket}/athena/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              "ignore.malformed.json": "true"
          Columns:
            - { Name: finding_uid, Type: string }
            - { Name: check_id, Type: string }
            - { Name: check_title, Type: string }
            - { Name: status, Type: string }
            - { Name: status_extended, Type: string }
            - { Name: severity, Type: string }
            - { Name: service_name, Type: string }
            - { Name: region, Type: string }
            - { Name: resource_id, Type: string }
            - { Name: resource_arn, Type: string }
            - { Name: account_id, Type: string }

  # Auto-run the Prowler scan on deploy (Create/Update) so enabling the feature
  # actually produces findings — no manual `codebuild start-build` needed. The
  # trigger only STARTS the build (async) and returns; it does not wait for the
  # 15-45 min scan to finish, so the stack completes promptly.
  ProwlerTriggerRole:
    Type: AWS::IAM::Role
    Condition: HasProwler
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: start-prowler-scan
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !GetAtt ProwlerScanProject.Arn

  ProwlerTriggerFunction:
    Type: AWS::Lambda::Function
    Condition: HasProwler
    Properties:
      FunctionName: !Sub "${AWS::StackName}-prowler-trigger"
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt ProwlerTriggerRole.Arn
      Timeout: 60
      MemorySize: 128
      Code:
        ZipFile: |
          import json, urllib.request, boto3
          cb = boto3.client("codebuild")

          def respond(event, context, status, reason=""):
              body = json.dumps({
                  "Status": status, "Reason": reason or f"See CloudWatch: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"], "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"], "Data": {},
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT",
                                           headers={"content-type": "", "content-length": str(len(body))})
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      build = cb.start_build(projectName=event["ResourceProperties"]["ProjectName"])
                      print("started build:", build["build"]["id"])
                      respond(event, context, "SUCCESS", "prowler scan started")
                  else:  # Delete — nothing to do
                      respond(event, context, "SUCCESS", "noop")
              except Exception as e:
                  # A failed scan-trigger must NOT roll back the whole stack; the user
                  # can always start the build manually. Log and succeed.
                  print("ERROR:", e)
                  respond(event, context, "SUCCESS", f"trigger error (start manually): {e}")

  ProwlerScanTrigger:
    Type: AWS::CloudFormation::CustomResource
    Condition: HasProwler
    DependsOn: ProwlerFindingsTable
    Properties:
      ServiceToken: !GetAtt ProwlerTriggerFunction.Arn
      ProjectName: !Ref ProwlerScanProject

  InvestigatorWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${AWS::StackName}-wg"
      State: ENABLED
      # Allow CFN to delete the workgroup even when it still holds query-execution
      # history — otherwise delete-stack fails with "WorkGroup ... is not empty".
      RecursiveDeleteOption: true
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        BytesScannedCutoffPerQuery: !Ref BytesScannedCutoff
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AthenaResultsBucket}/results/"

  # Conversational memory: per-session chat history for Bedrock Tool Use routing.
  # PAY_PER_REQUEST keeps it ephemeral/zero-idle-cost; TTL auto-expires sessions.
  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-chat-sessions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  OrchestratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: orchestrator
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: Bedrock
                Effect: Allow
                Action: bedrock:InvokeModel
                # BedrockModelId may be a cross-region inference profile (e.g. us.amazon.nova-pro-v1:0).
                # Invoking a profile requires permission on BOTH the inference-profile ARN and the
                # underlying foundation-model ARNs in every region the profile can route to. We grant
                # the profile in this account/region and the foundation model across all regions.
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}"
                  - !Sub "arn:aws:bedrock:*::foundation-model/*"
              - Sid: Athena
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: !Sub "arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${InvestigatorWorkGroup}"
              - Sid: Glue
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetPartitions
                  - glue:GetDatabase
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabaseName}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabaseName}/${GlueTableName}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabaseName}/${VpcFlowLogsTableName}"
                  - !If
                    - HasProwler
                    - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabaseName}/${ProwlerFindingsTableName}"
                    - !Ref "AWS::NoValue"
              - Sid: SourceLogsReadOnly
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${CloudTrailLogBucketName}"
                  - !Sub "arn:aws:s3:::${CloudTrailLogBucketName}/*"
                  - !Sub "arn:aws:s3:::${VpcFlowLogsBucketName}"
                  - !Sub "arn:aws:s3:::${VpcFlowLogsBucketName}/*"
              - Sid: AthenaResultsReadWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt AthenaResultsBucket.Arn
                  - !Sub "${AthenaResultsBucket.Arn}/*"
              - Sid: AuthSecret
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref AuthTokenSecret
              - Sid: ChatSessions
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt ChatSessionsTable.Arn
              - !If
                - HasProwler
                - Sid: ProwlerFindingsReadOnly
                  Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:ListBucket
                  Resource:
                    - !GetAtt ProwlerFindingsBucket.Arn
                    - !Sub "${ProwlerFindingsBucket.Arn}/*"
                - !Ref "AWS::NoValue"

  OrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-orchestrator"
      Runtime: python3.13
      Handler: main.handler
      Role: !GetAtt OrchestratorRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          GLUE_DATABASE: !Ref GlueDatabaseName
          GLUE_TABLE: !Ref GlueTableName
          GLUE_VPC_TABLE: !Ref VpcFlowLogsTableName
          ATHENA_WORKGROUP: !Ref InvestigatorWorkGroup
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          AUTH_SECRET_ARN: !Ref AuthTokenSecret
          BYTES_SCANNED_CUTOFF: !Ref BytesScannedCutoff
          ALLOWED_TIME_RANGE_MAX_DAYS: !Ref AllowedTimeRangeMaxDays
          DYNAMODB_SESSION_TABLE: !Ref ChatSessionsTable
          GLUE_PROWLER_TABLE: !If [HasProwler, !Ref ProwlerFindingsTableName, !Ref "AWS::NoValue"]
      Code:
        S3Bucket: !Sub "${ArtifactBucketPrefix}-${AWS::Region}"
        S3Key: !Sub "${ArtifactVersion}/backend.zip"

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST", "OPTIONS"]
        AllowHeaders: ["authorization", "content-type"]

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt OrchestratorFunction.Arn
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  # ---------------------------------------------------------------------------
  # One-click glue: a custom resource that publishes the SPA into SpaBucket,
  # bakes the live API URL into config.js, and empties the stack-owned buckets
  # on delete (so `delete-stack` succeeds without a manual empty step).
  # ---------------------------------------------------------------------------
  SpaDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: spa-deployer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadArtifacts
                Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucketPrefix}-${AWS::Region}"
                  - !Sub "arn:aws:s3:::${ArtifactBucketPrefix}-${AWS::Region}/*"
              - Sid: WriteStackBuckets
                Effect: Allow
                Action: [s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt SpaBucket.Arn
                  - !Sub "${SpaBucket.Arn}/*"
                  - !GetAtt AthenaResultsBucket.Arn
                  - !Sub "${AthenaResultsBucket.Arn}/*"
              - Sid: Invalidate
                Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SpaDistribution}"

  SpaDeployerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-spa-deployer"
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt SpaDeployerRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        ZipFile: |
          import json, urllib.request, mimetypes, boto3
          s3 = boto3.client("s3")
          cf = boto3.client("cloudfront")

          def respond(event, context, status, reason=""):
              body = json.dumps({
                  "Status": status, "Reason": reason or f"See CloudWatch: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"], "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"], "Data": {},
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT",
                                           headers={"content-type": "", "content-length": str(len(body))})
              urllib.request.urlopen(req)

          def empty(bucket):
              p = s3.get_paginator("list_objects_v2")
              for page in p.paginate(Bucket=bucket):
                  keys = [{"Key": o["Key"]} for o in page.get("Contents", [])]
                  if keys:
                      s3.delete_objects(Bucket=bucket, Delete={"Objects": keys})

          def handler(event, context):
              try:
                  props = event["ResourceProperties"]
                  spa = props["SpaBucket"]
                  if event["RequestType"] == "Delete":
                      empty(spa)
                      empty(props["ResultsBucket"])
                      return respond(event, context, "SUCCESS", "emptied buckets")

                  art, ver, prefix = props["ArtifactBucket"], props["ArtifactVersion"], props["ArtifactVersion"].rstrip("/") + "/frontend/"
                  paginator = s3.get_paginator("list_objects_v2")
                  for page in paginator.paginate(Bucket=art, Prefix=prefix):
                      for obj in page.get("Contents", []):
                          key = obj["Key"]
                          if key.endswith("/"):
                              continue
                          dest = key[len(prefix):]
                          ctype = mimetypes.guess_type(dest)[0] or "application/octet-stream"
                          s3.copy_object(Bucket=spa, Key=dest,
                                         CopySource={"Bucket": art, "Key": key},
                                         MetadataDirective="REPLACE", ContentType=ctype)
                  # Bake the live API endpoint into config.js (overrides any placeholder).
                  cfg = "window.TRAILWHISPERER_CONFIG = %s;\n" % json.dumps({"apiBase": props["ApiUrl"]})
                  s3.put_object(Bucket=spa, Key="config.js", Body=cfg.encode(),
                                ContentType="application/javascript")
                  try:
                      cf.create_invalidation(DistributionId=props["DistributionId"],
                          InvalidationBatch={"Paths": {"Quantity": 1, "Items": ["/*"]},
                                             "CallerReference": event["RequestId"]})
                  except Exception as e:
                      print("invalidation skipped:", e)
                  respond(event, context, "SUCCESS", "spa published")
              except Exception as e:
                  print("ERROR:", e)
                  respond(event, context, "FAILED", str(e))

  SpaDeployment:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: [SpaBucketPolicy, ApiStage]
    Properties:
      ServiceToken: !GetAtt SpaDeployerFunction.Arn
      ArtifactBucket: !Sub "${ArtifactBucketPrefix}-${AWS::Region}"
      ArtifactVersion: !Ref ArtifactVersion
      SpaBucket: !Ref SpaBucket
      ResultsBucket: !Ref AthenaResultsBucket
      DistributionId: !Ref SpaDistribution
      ApiUrl: !GetAtt HttpApi.ApiEndpoint

Outputs:
  UiUrl:
    Value: !Sub "https://${SpaDistribution.DomainName}"
  ApiUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
  SpaBucketName:
    Value: !Ref SpaBucket
  AuthSecretArn:
    Value: !Ref AuthTokenSecret
  AthenaWorkGroupName:
    Value: !Ref InvestigatorWorkGroup
  ProwlerScanProjectName:
    Condition: HasProwler
    Description: Trigger this CodeBuild project to run a Prowler scan (aws codebuild start-build --project-name ...).
    Value: !Ref ProwlerScanProject
  ProwlerFindingsBucketName:
    Condition: HasProwler
    Value: !Ref ProwlerFindingsBucket
